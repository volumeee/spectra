server:
  port: 3000
  read_timeout: 30s
  write_timeout: 60s

browser:
  max_instances: 5
  launch_timeout: 30s
  idle_timeout: 5m
  headless: true
  no_sandbox: true
  share_pool: true        # inject CDP endpoint into plugins (5-10x faster)
  warm_pool_size: 2       # pre-launch N browsers (zero cold-start latency)
  recycle_after: 50       # recycle browser after N uses (prevent memory drift)

queue:
  max_concurrent: 10
  max_pending: 100

auth:
  enabled: false
  api_key: ""

plugins:
  dir: "./bin/plugins"
  load_timeout: 10s
  call_timeout: 60s       # kills hung plugins automatically
  pool_size: 3            # concurrent processes per plugin

mcp:
  enabled: false
  transport: stdio        # stdio | sse

webhook:
  enabled: false
  max_retries: 3
  retry_interval: 5s

scheduler:
  enabled: false

log:
  level: info             # debug | info | warn | error
  format: json            # json | text

# Health monitoring — rejects requests when system is overloaded
health:
  enabled: true
  cpu_limit: 90           # percent
  memory_limit: 85        # percent

# Persistence — memory (default) or sqlite
storage:
  driver: sqlite          # memory | sqlite
  sqlite_path: ./spectra.db

# CDP video recording
recording:
  enabled: false
  format: both            # screencast | frames | both
  fps: 5
  quality: 80
  dir: ./recordings

# OpenTelemetry tracing (optional)
telemetry:
  enabled: false
  otlp_endpoint: "http://localhost:4317"
  service_name: "spectra"
