services:
  spectra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SPECTRA_SERVER_PORT=3000
      - SPECTRA_BROWSER_MAX_INSTANCES=5
      - SPECTRA_QUEUE_MAX_CONCURRENT=10
      - SPECTRA_LOG_LEVEL=info
      - SPECTRA_LOG_FORMAT=json
    volumes:
      - spectra-data:/home/spectra/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  spectra-data:
